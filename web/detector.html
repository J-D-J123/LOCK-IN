<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOCK IN · Phone Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono&family=Oswald:wght@300;700&display=swap" rel="stylesheet">

  <!-- TensorFlow.js + COCO-SSD object detection -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #FF6B00;
      --red:    #FF2222;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .brand {
      font-family: 'Anton', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 0.3rem;
    }

    .brand-sub {
      font-size: 0.68rem;
      letter-spacing: 0.38em;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    /* ── CAMERA VIEW ── */
    .cam-wrap {
      position: relative;
      width: 480px;
      height: 360px;
      border: 1px solid rgba(255,107,0,0.3);
      background: #080808;
      overflow: hidden;
    }

    #webcam {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror so it feels natural */
      display: block;
    }

    #det-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      /* canvas is NOT mirrored — coordinates match the mirrored video display */
    }

    /* Scanning line animation over camera */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, rgba(255,107,0,0.5), transparent);
      animation: scan 3s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      from { top: 0; opacity: 1; }
      90%  { opacity: 1; }
      to   { top: 100%; opacity: 0; }
    }

    /* Corner brackets */
    .cam-wrap::before,
    .cam-wrap::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      z-index: 2;
      pointer-events: none;
    }
    .cam-wrap::before {
      top: 0; left: 0;
      border-top: 2px solid var(--orange);
      border-left: 2px solid var(--orange);
    }
    .cam-wrap::after {
      bottom: 0; right: 0;
      border-bottom: 2px solid var(--orange);
      border-right: 2px solid var(--orange);
    }

    /* ── STATUS ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 1.4rem;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }
    .dot.loading  { background: #555; }
    .dot.watching { background: var(--orange); animation: blink 1.8s ease-in-out infinite; }
    .dot.alert    { background: var(--red);    animation: blink 0.35s ease-in-out infinite; }
    .dot.cooldown { background: #4488ff;       animation: blink 2s ease-in-out infinite; }

    .status-label           { color: rgba(255,255,255,0.4); }
    .status-label.watching  { color: var(--orange); }
    .status-label.alert     { color: var(--red); }
    .status-label.cooldown  { color: #88aaff; }

    /* Confidence bar */
    .conf-bar {
      width: 480px;
      height: 3px;
      background: rgba(255,255,255,0.05);
      margin-top: 0.5rem;
      overflow: hidden;
    }

    .conf-fill {
      height: 100%;
      width: 0%;
      background: var(--orange);
      transition: width 0.1s ease, background 0.1s ease;
    }

    /* ── INSTRUCTIONS ── */
    .note {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      max-width: 480px;
      line-height: 2;
    }

    /* ── ALERT OVERLAY ── */
    .alert-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      animation: flashRed 0.4s ease;
    }

    .alert-overlay.active { display: flex; }

    .alert-headline {
      font-family: 'Anton', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      text-transform: uppercase;
      color: var(--red);
      line-height: 0.9;
      text-shadow: 0 0 80px rgba(255,30,30,0.6);
      animation: shake 0.5s ease;
      margin-bottom: 1.5rem;
    }

    .alert-body {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
      max-width: 520px;
      margin-bottom: 3rem;
    }

    .alert-count {
      font-family: 'Anton', sans-serif;
      font-size: clamp(5rem, 15vw, 9rem);
      color: var(--orange);
      line-height: 1;
    }

    .alert-count-label {
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* ── ANIMATIONS ── */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    @keyframes flashRed {
      from { background: rgba(200,0,0,0.4); }
      to   { background: #000; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-10px); }
      40%       { transform: translateX(10px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }

    @media (max-width: 520px) {
      .cam-wrap, .conf-bar { width: 95vw; }
      .cam-wrap { height: 72vw; }
    }
  </style>
</head>
<body>

  <div class="brand">LOCK IN</div>
  <div class="brand-sub">Phone Detection Active</div>

  <div class="cam-wrap">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="det-canvas"></canvas>
    <div class="scan-line"></div>
  </div>

  <div class="status-row">
    <div class="dot loading" id="dot"></div>
    <span class="status-label" id="status-label">Loading AI model…</span>
  </div>

  <div class="conf-bar">
    <div class="conf-fill" id="conf-fill"></div>
  </div>

  <p class="note">
    Keep this tab open in the background.<br>
    The moment the camera sees your phone — it locks you in.
  </p>

  <!-- TAKEOVER OVERLAY -->
  <div class="alert-overlay" id="alert-overlay">
    <div class="alert-headline">PUT IT<br>DOWN.</div>
    <p class="alert-body">
      You picked up your phone.<br>
      That's the version of you that falls apart.<br>
      You promised yourself better than this.
    </p>
    <div class="alert-count" id="alert-count">3</div>
    <div class="alert-count-label">seconds until lock in</div>
  </div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const FRAMES_TO_CONFIRM = 15;    // consecutive frames before trigger
const CONFIDENCE_MIN    = 0.58;  // minimum detection confidence
const COOLDOWN_MS       = 45000; // 45s cooldown after redirect

// ── STATE ───────────────────────────────────────────────────
let model        = null;
let detecting    = false;
let consecutive  = 0;
let lastTrigger  = 0;
let alertRunning = false;

// ── DOM ─────────────────────────────────────────────────────
const video    = document.getElementById('webcam');
const canvas   = document.getElementById('det-canvas');
const ctx      = canvas.getContext('2d');
const dot      = document.getElementById('dot');
const lbl      = document.getElementById('status-label');
const confFill = document.getElementById('conf-fill');
const overlay  = document.getElementById('alert-overlay');
const countEl  = document.getElementById('alert-count');

// ── HELPERS ─────────────────────────────────────────────────
function setStatus(state, text) {
  dot.className   = 'dot ' + state;
  lbl.className   = 'status-label ' + state;
  lbl.textContent = text;
}

// ── BOOT ────────────────────────────────────────────────────
async function boot() {
  setStatus('loading', 'Loading AI model…');

  try {
    model = await cocoSsd.load({ base: 'mobilenet_v2' });
  } catch (e) {
    setStatus('', 'Model failed to load — refresh the page.');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(resolve => video.addEventListener('loadeddata', resolve, { once: true }));
  } catch (e) {
    setStatus('', 'Camera denied — allow access and refresh.');
    return;
  }

  canvas.width  = video.videoWidth  || 480;
  canvas.height = video.videoHeight || 360;

  setStatus('watching', 'Watching…');
  detecting = true;
  loop();
}

// ── DETECTION LOOP ──────────────────────────────────────────
async function loop() {
  if (!detecting) return;

  const now      = Date.now();
  const cooldown = now - lastTrigger < COOLDOWN_MS;

  let preds = [];
  try { preds = await model.detect(video); } catch (_) {}

  // Filter for phones only
  const phones = preds.filter(p => p.class === 'cell phone' && p.score >= CONFIDENCE_MIN);

  // ── Draw bounding boxes (coordinates are in original un-mirrored space;
  //    canvas CSS is NOT flipped, so we mirror the x coords manually to
  //    match the CSS-mirrored video display)
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (phones.length && !cooldown) {
    phones.forEach(p => {
      const [x, y, w, h] = p.bbox;
      // Mirror x to match the CSS-flipped video
      const mirroredX = canvas.width - x - w;
      ctx.strokeStyle = '#FF6B00';
      ctx.lineWidth   = 2;
      ctx.strokeRect(mirroredX, y, w, h);
      ctx.fillStyle = 'rgba(255,107,0,0.12)';
      ctx.fillRect(mirroredX, y, w, h);

      // Label
      ctx.fillStyle = '#FF6B00';
      ctx.font      = 'bold 11px monospace';
      ctx.fillText(`PHONE ${Math.round(p.score * 100)}%`, mirroredX + 4, y > 16 ? y - 4 : y + 14);
    });
  }

  // ── Confidence meter
  const maxConf = phones.length ? Math.max(...phones.map(p => p.score)) : 0;
  confFill.style.width      = (maxConf * 100).toFixed(1) + '%';
  confFill.style.background = maxConf > 0.78 ? '#FF2222' : '#FF6B00';

  // ── State machine
  if (cooldown && !alertRunning) {
    const secs = Math.ceil((COOLDOWN_MS - (now - lastTrigger)) / 1000);
    setStatus('cooldown', `Cooldown — resuming in ${secs}s`);
    consecutive = 0;

  } else if (phones.length && !alertRunning) {
    consecutive++;
    const pct = Math.round((consecutive / FRAMES_TO_CONFIRM) * 100);
    setStatus('alert', `Phone detected — locking in… ${pct}%`);

    if (consecutive >= FRAMES_TO_CONFIRM) {
      triggerAlert();
      return; // stop loop until redirect
    }

  } else if (!alertRunning) {
    if (consecutive > 0) consecutive--;
    setStatus('watching', 'Watching…');
  }

  requestAnimationFrame(loop);
}

// ── ALERT + REDIRECT ────────────────────────────────────────
function triggerAlert() {
  alertRunning = true;
  lastTrigger  = Date.now();
  overlay.classList.add('active');
  setStatus('alert', 'PHONE DETECTED');

  let count = 3;
  countEl.textContent = count;

  const tick = setInterval(() => {
    count--;
    countEl.textContent = count;
    if (count <= 0) {
      clearInterval(tick);
      window.location.href = 'index.html';
    }
  }, 1000);
}

boot();
</script>
</body>
</html>
