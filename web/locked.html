<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOCKED</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --red: #FF1111; --orange: #FF6B00; --gold: #FFD700; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* Pulsing red background glow */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(200,0,0,0.18) 0%, transparent 70%);
      animation: breathe 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    /* Grid lines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,17,17,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,17,17,0.05) 1px, transparent 1px);
      background-size: 55px 55px;
      pointer-events: none;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.08); }
    }

    /* ── MAIN LAYOUT ── */
    .page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      padding: 2rem;
    }

    /* ── OFFENSE BADGE ── */
    .offense-badge {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      letter-spacing: 0.4em;
      color: var(--red);
      text-transform: uppercase;
      border: 1px solid rgba(255,17,17,0.35);
      padding: 0.5rem 1.4rem;
      margin-bottom: 2.5rem;
      animation: blink-border 1.2s ease-in-out infinite;
    }

    @keyframes blink-border {
      0%, 100% { border-color: rgba(255,17,17,0.35); }
      50%       { border-color: rgba(255,17,17,0.8); }
    }

    /* ── HEADLINE ── */
    .headline {
      font-family: 'Anton', sans-serif;
      font-size: clamp(4rem, 14vw, 11rem);
      line-height: 0.87;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      animation: flickerIn 0.6s ease both;
    }

    .headline .red  { color: var(--red); text-shadow: 0 0 60px rgba(255,17,17,0.5); }
    .headline .dim  { color: rgba(255,255,255,0.7); }

    @keyframes flickerIn {
      0%   { opacity: 0; transform: scale(1.05); }
      30%  { opacity: 0.6; }
      60%  { opacity: 0.3; }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ── COUNTDOWN ── */
    .countdown-wrap {
      margin: 1.5rem 0 2rem;
    }

    .countdown-label {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.6rem, 1.2vw, 0.78rem);
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .countdown {
      font-family: 'Anton', sans-serif;
      font-size: clamp(5rem, 18vw, 14rem);
      line-height: 1;
      color: var(--orange);
      letter-spacing: 0.02em;
      text-shadow: 0 0 80px rgba(255,107,0,0.4);
      animation: countPulse 1s ease-in-out infinite;
    }

    @keyframes countPulse {
      0%, 100% { text-shadow: 0 0 80px rgba(255,107,0,0.4); }
      50%       { text-shadow: 0 0 120px rgba(255,107,0,0.7); }
    }

    /* ── QUOTE ── */
    .quote {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      line-height: 1.75;
      max-width: 580px;
      margin-bottom: 2.5rem;
    }

    /* ── NEXT WARNING ── */
    .next-warn {
      border: 1px solid rgba(255,107,0,0.3);
      border-left: 4px solid var(--orange);
      background: rgba(255,107,0,0.06);
      padding: 1.2rem 2rem;
      max-width: 540px;
      width: 100%;
    }

    .next-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .next-duration {
      font-family: 'Anton', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .next-duration .warn-val { color: var(--orange); }

    /* ── DONE FLASH ── */
    .done-overlay {
      position: fixed; inset: 0;
      background: rgba(0,200,60,0.12);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    .done-overlay.active { display: flex; }

    .done-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      text-transform: uppercase;
      color: #00DD55;
      text-shadow: 0 0 60px rgba(0,220,80,0.5);
    }

    .done-sub {
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="offense-badge" id="offense-badge">Lockdown #1</div>

  <h1 class="headline">
    <span class="dim">Computer</span><br>
    <span class="red">Locked.</span>
  </h1>

  <div class="countdown-wrap">
    <div class="countdown-label">Time remaining</div>
    <div class="countdown" id="countdown">0:00</div>
  </div>

  <p class="quote" id="quote">
    You picked up your phone.<br>
    That's the version of you that falls apart. Sit with it.
  </p>

  <div class="next-warn">
    <div class="next-label">If you pick it up again, next lockdown is</div>
    <div class="next-duration">
      <span class="warn-val" id="next-duration-val">—</span>
    </div>
  </div>
</div>

<!-- Unlock flash -->
<div class="done-overlay" id="done-overlay">
  <div class="done-title">Unlocked.</div>
  <p class="done-sub">Don't make it worse. Lock in.</p>
</div>

<script>
  // ── Block DevTools / escape attempts ────────────────────────
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') ||
        (e.ctrlKey && e.shiftKey && e.key === 'J') ||
        (e.ctrlKey && e.key === 'u')) {
      e.preventDefault();
    }
  });

  // ── Read URL params ───────────────────────────────────────────
  const params   = new URLSearchParams(window.location.search);
  const DURATION = parseInt(params.get('d') || '300', 10);    // seconds
  const OFFENSE  = parseInt(params.get('n') || '1',   10);
  const NEXT_S   = parseInt(params.get('next') || '0', 10);

  // ── Rotating quotes ──────────────────────────────────────────
  const QUOTES = [
    'You picked up your phone.<br>That\'s the version of you that falls apart. Sit with it.',
    '"The dream doesn\'t die. You do — one excuse at a time."',
    '"Pain from discipline weighs ounces. Regret weighs tons."',
    '"Every scroll you make is someone else\'s come up."',
    '"You said you would. Prove it."',
    '"While you\'re overthinking, they\'re outworking."',
    'You have everything you need to change your life.<br>Except the decision to do it.',
    '"Who you are right now is who you chose to become."',
  ];

  const quoteEl = document.getElementById('quote');
  let qi = 0;
  setInterval(() => {
    quoteEl.style.opacity = '0';
    quoteEl.style.transition = 'opacity 0.5s';
    setTimeout(() => {
      qi = (qi + 1) % QUOTES.length;
      quoteEl.innerHTML = QUOTES[qi];
      quoteEl.style.opacity = '1';
    }, 500);
  }, 6000);

  // ── Offense badge ─────────────────────────────────────────────
  document.getElementById('offense-badge').textContent =
    `Lockdown #${OFFENSE}`;

  // ── Next duration display ─────────────────────────────────────
  function fmtDuration(secs) {
    if (secs <= 0) return '—';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    if (h > 0) return `${h} hr ${m > 0 ? m + ' min' : ''}`.trim();
    if (m > 0) return `${m} min${s > 0 ? ' ' + s + ' sec' : ''}`;
    return `${s} sec`;
  }

  document.getElementById('next-duration-val').textContent =
    NEXT_S > 0 ? fmtDuration(NEXT_S) : '—';

  // ── Countdown ─────────────────────────────────────────────────
  const countdownEl = document.getElementById('countdown');
  let remaining     = DURATION;

  function tick() {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    countdownEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;

    if (remaining <= 0) {
      // Show done overlay briefly before Python closes the window
      document.getElementById('done-overlay').classList.add('active');
      return;
    }

    // Red flash in final 10 seconds
    if (remaining <= 10) {
      countdownEl.style.color = '#FF1111';
      countdownEl.style.textShadow = '0 0 120px rgba(255,17,17,0.8)';
    }

    remaining--;
    setTimeout(tick, 1000);
  }

  tick();
</script>
</body>
</html>
